<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Mi Rosa Encantada 3D</title>
    <link rel="stylesheet" href="style.css">
    <!-- Primero cargamos la librería 3D -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- El contenedor donde se creará el universo 3D -->
    <div id="canvas-3d-container"></div>

    <div class="main-container">
        <!-- Campanita dorada flotante -->
        <button class="bell-button" id="bell-btn" title="Descubre tu mensaje de hoy">
            🔔
        </button>

        <h1>Para Mi Rosa Encantada</h1>
        <p class="instruccion">Toca y arrastra para girar el domo</p>
    </div>

    <!-- Carta Mágica con tu frase e imagen -->
    <div class="modal-overlay" id="message-modal">
        <div class="modal-box">
            <div class="sparkles">✨ 🌹 ✨</div>
            <h3 id="modal-date">Un Pensamiento Para Ti</h3>
            <p id="daily-message-text" class="parrafo-mensaje">
                <!-- Se carga con JS -->
            </p>
            
            <!-- IMPORTANTE: Cambia "tu-imagen.jpg" por el nombre exacto de tu archivo en GitHub, respetando mayúsculas y minúsculas -->
            <img src="tu-imagen.jpg" alt="Imagen Especial" class="imagen-mensaje">
            
            <button class="btn" id="close-modal">Guardar en el corazón</button>
        </div>
    </div>

    <!-- Movimos tu script aquí al final para asegurar que lea la librería "THREE" correctamente -->
    <script src="script.js"></script>
</body>
</html>
