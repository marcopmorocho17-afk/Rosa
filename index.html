<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Mi Rosa Encantada 3D</title>
    <link rel="stylesheet" href="style.css">
    <!-- Enlace oficial directo y libre de bloqueos de rutas -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- El lienzo donde se dibuja el entorno interactivo 3D -->
    <div id="canvas-3d-container"></div>

    <div class="main-container">
        <!-- Campanita dorada flotante -->
        <button class="bell-button" id="bell-btn" title="Descubre tu mensaje de hoy">
            🔔
        </button>

        <h1>Para Mi Rosa Encantada</h1>
        <p class="instruccion">Gira a la derecha para ver el sol, a la izquierda para encender la noche</p>
    </div>

    <!-- Carta Mágica con tu frase e imagen -->
    <div class="modal-overlay" id="message-modal">
        <div class="modal-box">
            <div class="sparkles">✨ 🌹 ✨</div>
            <h3 id="modal-date">Un Pensamiento Para Ti</h3>
            <p id="daily-message-text" class="parrafo-mensaje">
                <!-- Se carga automáticamente con JavaScript -->
            </p>
            
            <!-- Tu foto de GitHub se enlazará aquí -->
            <img src="tu-imagen.jpg" alt="Imagen Especial" class="imagen-mensaje">
            
            <button class="btn" id="close-modal">Guardar en el corazón</button>
        </div>
    </div>

    <!-- El script al final asegura que todo el HTML se lea primero -->
    <script src="script.js"></script>
</body>
</html>
